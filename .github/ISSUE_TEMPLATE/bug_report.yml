name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the problem?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: NCE Version
      description: What version of Neural Constitution Engine are you using?
    validations:
      required: true
