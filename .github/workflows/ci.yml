name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pyyaml pydantic>=2.0.0

    - name: Test with pytest (pure unit tests)
      run: |
        PYTHONPATH=. pytest backend/tests/core/ backend/tests/cli/ -v
