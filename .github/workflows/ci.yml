name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" --no-deps
        pip install pytest pytest-asyncio httpx pyyaml fastapi uvicorn pydantic pydantic-settings python-multipart sqlalchemy asyncpg alembic python-jose[cryptography] passlib[bcrypt] starlette

    - name: Test with pytest (core tests only)
      run: |
        PYTHONPATH=. pytest \
          --ignore=backend/tests/integrations/langgraph \
          --ignore=backend/tests/integrations/providers \
          --ignore=backend/tests/sdk
